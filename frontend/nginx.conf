proxy_cache_path /var/cache/nginx/api_stats levels=1:2 keys_zone=api_stats_cache:10m max_size=50m inactive=1m use_temp_path=off;

upstream backend_service {
    server backend:3000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass http://backend_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /api/stats {
        proxy_pass http://backend_service/stats;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_cache api_stats_cache;
        proxy_cache_valid 200 30s;
        add_header X-Cache-Status $upstream_cache_status;
    }
}