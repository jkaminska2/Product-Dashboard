worker_processes  1;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    proxy_cache_path /var/cache/nginx/stats_cache levels=1:2 keys_zone=stats_zone:10m max_size=50m inactive=1m use_temp_path=off;

    map $upstream_cache_status $cache_status_header {
        default "MISS";
        HIT     "HIT";
        BYPASS  "BYPASS";
        EXPIRED "EXPIRED";
        STALE   "STALE";
        UPDATING "UPDATING";
        REVALIDATED "REVALIDATED";
    }

    upstream backend_upstream {
        server backend:3000;
    }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri /index.html;
        }

        location /api/ {
            proxy_pass http://backend_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location = /api/stats {
            proxy_pass http://backend_upstream/stats;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_cache stats_zone;
            proxy_cache_valid 200 30s;
            add_header X-Cache-Status $cache_status_header always;
        }
    }
}